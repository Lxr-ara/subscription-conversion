<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <link rel="stylesheet" href="<%= BASE_URL %>css/main.css">
    <title>SubLink · 在线订阅转换</title>
    <meta name="keywords" content="订阅转换,Clash,Sing-Box,Quantumult X,Surge,Shadowrocket" />

  </head>
  <body>
    <section id="canvas-show" class="canvas-wrap">
    <div id="canvas" class="gradient"></div>
    </section>
    <div id="app"></div>
    <script src="<%= BASE_URL %>js/jquery.min.js"></script>
    <script src="<%= BASE_URL %>js/three.min.js"></script>
    <script src="<%= BASE_URL %>js/projector.js"></script>
    <script src="<%= BASE_URL %>js/canvas-renderer.js"></script>
    <script src="<%= BASE_URL %>js/3d-lines-animation.js"></script>
    <script src="<%= BASE_URL %>js/color.js"></script>
